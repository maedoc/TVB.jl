name: CI
on:
  - push
jobs:
  build:
    runs-on: ubuntu-latest
    steps:

      - uses: actions/checkout@v2

      - uses: julia-actions/setup-julia@v1
        with:
          version: 1.5.1
      
      - name: setup packages
        run: julia -e 'import Pkg; Pkg.activate("."); Pkg.instantiate()'

      - name: run algo sweep
        run: julia scratch.jl
